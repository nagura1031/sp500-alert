name: S&P 500 Daily Alert

on:
  schedule:
    - cron: "0 22 * * *"   # 日本時間 07:00
  workflow_dispatch:

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run S&P 500 alert
        run: python3 20%ofSPYdecline.py
